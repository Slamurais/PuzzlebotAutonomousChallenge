joystick:
  ros__parameters:
    device_id: 0
    device_name: ""
    deadzone: 0.1             
    autorepeat_rate: 20.0
    sticky_buttons: false
    coalesce_interval_ms: 1

joy_teleop:
  ros__parameters:
    move:
      type: topic
      interface_type: geometry_msgs/msg/Twist
      topic_name: /cmd_vel_joy
      deadman_buttons: [5] 
          
      axis_mappings:
        linear-x:   
          axis: 1
          scale: 0.17
          offset: 0.0
        angular-z:  
          axis: 3
          scale: 0.15
          offset: 0.0